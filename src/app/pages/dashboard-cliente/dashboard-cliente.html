<div class="dashboard-container">
  
  <div class="datos-header">
    <div class="icon-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
    <h2 class="titulo">Mis Datos</h2>
  </div>

  <div class="form-container">
    <form (ngSubmit)="guardarCambios()">
      <div class="form-grid">
        
        <div class="form-group">
          <label>Nombre completo</label>
          <div class="input-wrapper">
            <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required>
            <button type="button" class="btn-edit" title="Editar">✏️</button>
          </div>
        </div>

        <div class="form-group">
          <label>Numero de celular</label>
          <div class="input-wrapper">
            <input type="tel" [(ngModel)]="usuario.telefono" name="telefono" required>
            <button type="button" class="btn-edit" title="Editar">✏️</button>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" [(ngModel)]="usuario.email" name="email" required>
            <button type="button" class="btn-edit" title="Editar">✏️</button>
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="usuario.password" name="password" required>
            <button type="button" class="btn-edit" title="Editar">✏️</button>
          </div>
        </div>

      </div>

      <div class="form-actions">
        @if (mensaje) {
          <div [ngClass]="{'msg-success': tipoMensaje === 'success', 'msg-error': tipoMensaje === 'error'}">
            {{ mensaje }}
          </div>
        }
        <button type="submit" class="btn-guardar">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
