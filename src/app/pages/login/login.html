<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border">
    <h2 class="text-2xl font-bold text-center mb-6">Iniciar Sesión</h2>
    
    <form (ngSubmit)="ingresar()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium">Email</label>
        <input [(ngModel)]="credenciales.email" name="email" type="email" class="w-full p-2 border rounded" required>
      </div>
      <div>
        <label class="block text-sm font-medium">Contraseña</label>
        <input [(ngModel)]="credenciales.password" name="password" type="password" class="w-full p-2 border rounded" required>
      </div>
      
      <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">{{ errorMessage }}</div>
      
      <button type="submit" class="w-full bg-[#008f5d] text-white py-2 rounded font-bold hover:bg-emerald-700 transition-colors">
        Ingresar
      </button>
    </form>

    <div class="mt-6 text-center text-sm">
      <p class="text-gray-600">¿No tienes una cuenta?</p>
      <a routerLink="/registro" class="font-bold text-[#008f5d] hover:text-emerald-700 hover:underline transition-colors mt-1 inline-block">
        Regístrate aquí
      </a>
    </div>

  </div>
</div>
