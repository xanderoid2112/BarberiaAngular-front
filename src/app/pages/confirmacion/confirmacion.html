<!-- HEADER -->
<div class="confirmacion-header">
  <span class="header-icon">📅</span>
  <h1 class="header-title">Confirmación de cita</h1>
</div>

<p class="confirmacion-subtitle">
  Verifica que tus datos esten correctos y que las opciones seleccionadas sean las correctas:
</p>

<!-- MAIN CONTENT -->
<div class="confirmacion-content">

  <!-- LEFT COLUMN -->
  <div class="confirmacion-left">

    <!-- Datos del cliente -->
    <table class="datos-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Numero de celular</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <span class="dato-valor">Juan</span>
            <button class="btn-edit">✏️</button>
          </td>
          <td>
            <span class="dato-valor">902 234 123</span>
            <button class="btn-edit">✏️</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Booking summary -->
    <div class="booking-bar">
      <span>Barberia: <strong>BarberShoop</strong></span>
      <span>Barbero: <strong>Jesus</strong></span>
      <span>Horario: <strong>Lunes - 9:00 am</strong></span>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="confirmacion-right">

    <!-- Resumen productos -->
    <table class="resumen-table">
      <thead>
        <tr>
          <th>Productos</th>
          <th>Cantidad</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Capilares</td>
          <td>2</td>
        </tr>
      </tbody>
    </table>

    <!-- Navigation buttons -->
    <div class="nav-buttons">
      <button class="btn-retroceder" routerLink="/productos">↺ Retroceder</button>
      <button class="btn-confirmar" routerLink="/mis-citas">Confirmar Reserva</button>
    </div>

  </div>

</div>
