<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] border border-gray-100">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-slate-900">Registro de Usuario</h2>
      <p class="mt-2 text-sm text-gray-500">Crea tu cuenta para agendar en las mejores barberías</p>
    </div>

    <form (ngSubmit)="registrar()" class="space-y-6">
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Completo</label>
        <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="usuario.email" name="email" required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Teléfono</label>
        <input type="tel" [(ngModel)]="usuario.telefono" name="telefono" required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input type="password" [(ngModel)]="usuario.password" name="password" required
          class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm">
      </div>

      <div *ngIf="errorMessage" class="bg-red-50 text-red-500 p-3 rounded-md text-sm text-center">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="bg-emerald-50 text-emerald-600 p-3 rounded-md text-sm text-center">
        {{ successMessage }}
      </div>

      <div>
        <button type="submit"
          class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#008f5d] hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
          Guardar Usuario
        </button>
      </div>
    </form>

    <div class="mt-6 text-center">
      <a routerLink="/login" class="font-medium text-slate-600 hover:text-emerald-600 text-sm transition-colors">
        Volver al Login
      </a>
    </div>

  </div>
</div>
